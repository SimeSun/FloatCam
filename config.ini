[camera]
# Default source resolution requested from the camera at startup.
# 720p 在 Windows DShow 上协商最快，能让首帧画面尽快出现；
# 用户可在运行时通过相机弹出面板切换到更高分辨率。
default_width = 1280
default_height = 720

# DirectShow FOURCC formats requested in order. MJPG is usually the most
# reliable way to get real 1080p+ webcam streams through OpenCV on Windows.
preferred_fourccs = MJPG,YUY2,NV12
fps = 30

[macos]
# 若已安装 PyObjC（见 requirements-macos.txt），优先走原生 AVFoundation 会话，
# 以便开启 Center Stage 等系统能力；设为 false 则强制使用 OpenCV 采集。
use_native_avfoundation = true
# 在硬件/当前格式支持时尝试开启 Center Stage（人物居中）。
prefer_center_stage = true
